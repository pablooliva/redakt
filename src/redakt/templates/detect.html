{% extends "base.html" %}
{% block title %}Detect PII - Redakt{% endblock %}

{% block content %}
<h1>PII Detection</h1>
<p>Paste text below to check for personally identifiable information.</p>

<form hx-post="/detect/submit" hx-target="#results" hx-indicator="#spinner">
    <div class="form-group">
        <label for="text">Text to analyze</label>
        <textarea id="text" name="text" rows="8" placeholder="Paste text here..."
                  oninput="document.getElementById('results').innerHTML = ''"></textarea>
    </div>

    <div class="form-group">
        <label>Language</label>
        <div class="toggle-group">
            <label class="toggle">
                <input type="radio" name="language" value="auto" checked>
                <span>Auto</span>
            </label>
            <label class="toggle">
                <input type="radio" name="language" value="en">
                <span>English</span>
            </label>
            <label class="toggle">
                <input type="radio" name="language" value="de">
                <span>German</span>
            </label>
        </div>
    </div>

    <button type="submit">Detect PII</button>
    <span id="spinner" class="htmx-indicator">Analyzing...</span>
</form>

<div id="results"></div>
{% endblock %}
